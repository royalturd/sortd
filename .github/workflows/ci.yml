name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Smoke tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x sortd.sh install.sh test/test.sh

      - name: Run tests
        run: sh test/test.sh

  shellcheck:
    name: ShellCheck lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint sortd.sh
        run: shellcheck -s sh sortd.sh install.sh
