name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Smoke tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x sortd.sh install.sh test/test.sh

      - name: Run tests
        run: sh test/test.sh
